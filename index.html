<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RICOS SURVIVOR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <input id="input" autocomplete="off" placeholder="Type here..." autofocus />
  <button id="mute-btn" title="Toggle sound" aria-label="Toggle sound">🔊</button>

  <!-- Start Screen Overlay -->
  <div id="start-screen-overlay">
    <div class="overlay-content">
      <img class="start-title" src="/src/assets/images/ricos-survivor-logo.svg" alt="Ricos Survivor" />

      <div class="start-below-title">
        <img id="start-stumpy" class="start-stumpy" alt="Stumpy" />

        <div class="start-name-section">
          <input id="start-player-name" type="text" maxlength="20" placeholder="Enter your name..." autocomplete="off" />
          <p class="start-hint">Press <kbd>Enter</kbd> to start</p>
        </div>

        <div class="leaderboard-section">
          <h2 class="leaderboard-title">Leaderboard</h2>
          <ol id="start-leaderboard-list" class="leaderboard-list"></ol>
          <p id="start-leaderboard-empty" class="leaderboard-empty hidden">No scores yet</p>
        </div>
      </div>
    </div>

    <div class="tutorial-preview-wrapper">
      <div class="tutorial-preview">
        <iframe src="/tutorial.html?embed=1"></iframe>
      </div>
      <p class="tutorial-hint">Type to attack<br>Press <kbd>space</kbd> to reset target</p>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="game-over-overlay" class="hidden">
    <div class="overlay-content">
      <h1 class="overlay-title">GAME OVER</h1>

      <div class="overlay-below-title">
        <img id="dead-stumpy" class="dead-stumpy" alt="Dead Stumpy" />

        <div class="overlay-stats">
          <p id="overlay-score" class="overlay-score"></p>
          <p id="overlay-wave" class="overlay-wave"></p>
        </div>

        <div class="leaderboard-section">
          <h2 class="leaderboard-title">Leaderboard</h2>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
          <p id="leaderboard-empty" class="leaderboard-empty hidden">No scores yet</p>
        </div>

        <p class="overlay-hint">Press <kbd>Esc</kbd> for menu</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
